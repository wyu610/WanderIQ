name: WanderIQ
options:
  # App Store Connect app 6779690103 is registered as com.WanderIQ (prefix +
  # target name); the iCloud container keeps iCloud.com.wanderiq.WanderIQ.
  bundleIdPrefix: com
  deploymentTarget:
    iOS: "17.0"
configFiles:
  Debug: Signing.xcconfig
  Release: Signing.xcconfig
packages:
  WanderIQKit:
    path: WanderIQKit
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
targets:
  WanderIQ:
    type: application
    platform: iOS
    sources: [WanderIQ]
    dependencies:
      - package: WanderIQKit
      - package: Supabase
        product: Supabase
    scheme:
      testTargets: [WanderIQUITests]
    entitlements:
      path: WanderIQ.entitlements
      properties:
        # Sign in with Apple (native). No aps-environment: the app uses only
        # local notifications, so declaring push would risk guideline 2.5.4.
        com.apple.developer.applesignin: [Default]
    info:
      path: WanderIQ/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: WanderIQ
        CFBundleLocalizations: [en, zh-Hans]
        # Wire versions to build settings; XcodeGen otherwise hardcodes 1.0/1
        # and MARKETING_VERSION never reaches the binary.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # Only HTTPS/iCloud (exempt) encryption; skips the ASC export-compliance
        # prompt on every upload.
        ITSAppUsesNonExemptEncryption: false
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        # Google OAuth redirect (supabase-swift signInWithOAuth → com.wanderiq://).
        CFBundleURLTypes:
          - CFBundleURLSchemes: [com.wanderiq]
        # ASC upload validation (error 90474) requires these; iPad must list
        # all four orientations because the app doesn't require full screen.
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait, UIInterfaceOrientationLandscapeLeft, UIInterfaceOrientationLandscapeRight]
        UISupportedInterfaceOrientations~ipad: [UIInterfaceOrientationPortrait, UIInterfaceOrientationPortraitUpsideDown, UIInterfaceOrientationLandscapeLeft, UIInterfaceOrientationLandscapeRight]
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.10"
        # v2 (accounts + Supabase sync, CloudKit retired) ships publicly as 2.2.
        # 1.0 (1) only ever went to TestFlight. Build number is 1 for the 2.2
        # version train; bump CURRENT_PROJECT_VERSION for each re-upload of 2.2.
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "2.2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  WanderIQUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [WanderIQUITests]
    dependencies:
      - target: WanderIQ
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
