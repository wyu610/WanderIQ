name: WanderIQ
options:
  # App Store Connect app 6779690103 is registered as com.WanderIQ (prefix +
  # target name); the iCloud container keeps iCloud.com.wanderiq.WanderIQ.
  bundleIdPrefix: com
  deploymentTarget:
    iOS: "17.0"
configFiles:
  Debug: Signing.xcconfig
  Release: Signing.xcconfig
packages:
  WanderIQKit:
    path: WanderIQKit
targets:
  WanderIQ:
    type: application
    platform: iOS
    sources: [WanderIQ]
    dependencies:
      - package: WanderIQKit
    scheme:
      testTargets: [WanderIQUITests]
    entitlements:
      path: WanderIQ.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers: [iCloud.com.wanderiq.WanderIQ]
        com.apple.developer.icloud-services: [CloudKit]
        aps-environment: development
    info:
      path: WanderIQ/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: WanderIQ
        CFBundleLocalizations: [en, zh-Hans]
        UIBackgroundModes: [remote-notification]
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.10"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.3.0
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  WanderIQUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [WanderIQUITests]
    dependencies:
      - target: WanderIQ
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
