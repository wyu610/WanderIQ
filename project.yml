name: Planova
options:
  bundleIdPrefix: com.planova
  deploymentTarget:
    iOS: "17.0"
configFiles:
  Debug: Signing.xcconfig
  Release: Signing.xcconfig
packages:
  PlanovaKit:
    path: PlanovaKit
targets:
  Planova:
    type: application
    platform: iOS
    sources: [Planova]
    dependencies:
      - package: PlanovaKit
    scheme:
      testTargets: [PlanovaUITests]
    entitlements:
      path: Planova.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers: [iCloud.com.planova.Planova]
        com.apple.developer.icloud-services: [CloudKit]
        aps-environment: development
    info:
      path: Planova/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: Planova
        CFBundleLocalizations: [en, zh-Hans]
        UIBackgroundModes: [remote-notification]
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.10"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.3.0
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  PlanovaUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [PlanovaUITests]
    dependencies:
      - target: Planova
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
